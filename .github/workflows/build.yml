name: Build & Test MASSIVE RADIO AUTOMATION SYSTEM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev portaudio19-dev
    
    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf freetype portaudio
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip setuptools wheel
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Verify imports
      run: |
        python -c "import pygame; print('✓ pygame')"
        python -c "import PyQt5; print('✓ PyQt5')"
        python -c "import fastapi; print('✓ FastAPI')"
