name: Build & Test MASSIVE RADIO AUTOMATION SYSTEM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-setup:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev portaudio19-dev
    
    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf freetype portaudio
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip setuptools wheel
    
    - name: Install dependencies
      run: pip install -r requirements.txt
      continue-on-error: true
    
    - name: Python version check
      run: python --version

  lint-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install flake8
      run: pip install flake8
    
    - name: Lint Python files
      run: flake8 . --count --exit-zero --max-line-length=127 --statistics || true

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install security tools
      run: pip install bandit safety
    
    - name: Run bandit
      run: bandit -r . -f json -o bandit-report.json || true
    
    - name: Run safety check
      run: safety check || true

  status-check:
    needs: [validate-setup, lint-check, security-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Build Status
      run: echo "Build workflow completed successfully"
